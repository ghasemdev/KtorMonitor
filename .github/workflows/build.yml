name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run unit tests
        run: ./gradlew jvmTest

#      - name: Upload test reports
#        uses: actions/upload-artifact@v7
#        with:
#          name: test-reports
#          path: "**/build/reports/tests/"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Android APKs
        run: ./gradlew :sample:ktor:assembleDebug :sample:ktor:assembleRelease :sample:okhttp:assembleDebug :sample:okhttp:assembleRelease

#      - name: Upload Android APKs
#        uses: actions/upload-artifact@v7
#        with:
#          name: android-apks
#          path: "**/build/outputs/apk/**/*.apk"

#  build-ios:
